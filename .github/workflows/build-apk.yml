name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create myapp com.example.myapp "NabdSmartCare"
          rm -rf myapp/www/*
          cp -r * myapp/www/ || true
          rm -rf myapp/www/myapp
          
      - name: Fix Insecure File Mode for Webview
        run: |
          echo '<preference name="AndroidInsecureFileModeEnabled" value="true" />' >> myapp/config.xml
          echo '<preference name="hostname" value="localhost" />' >> myapp/config.xml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd myapp
          cordova platform add android@10.1.0 --no-telemetry
          cordova build android --no-telemetry

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
